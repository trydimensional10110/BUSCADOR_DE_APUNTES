<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apuntes 6to 2da</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; padding: 0; }
    .header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background: #1e293b; border-bottom: 1px solid #334155; }
    .header-left { display: flex; align-items: center; gap: 1rem; }
    .header-logo { font-size: 2rem; }
    .header-titulo { font-weight: bold; font-size: 1.2rem; }
    .header-sub { font-size: 0.85rem; color: #94a3b8; }
    .nav { display: flex; align-items: center; gap: 1rem; }
    .nav-btn { background: transparent; border: 1px solid #475569; color: #cbd5e1; padding: 0.5rem 1rem; border-radius: 0.375rem; cursor: pointer; }
    .nav-btn.activo { background: #3b82f6; border-color: #3b82f6; color: white; }
    .user-chip { display: flex; align-items: center; gap: 0.5rem; background: #1e293b; padding: 0.25rem 0.75rem; border-radius: 9999px; border: 1px solid #334155; }
    .rol-badge { padding: 0.125rem 0.5rem; border-radius: 0.25rem; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; color: white; }
    .logout-btn { background: transparent; border: none; color: #ef4444; cursor: pointer; font-size: 1.1rem; }
    .main { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
    .notif { position: fixed; top: 1rem; right: 1rem; padding: 1rem; border-radius: 0.5rem; color: white; font-weight: bold; z-index: 50; }
    .notif.ok { background: #10b981; }
    .notif.error { background: #ef4444; }
    .notif.info { background: #3b82f6; }
    .login-bg { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #0f172a; }
    .login-card { background: #1e293b; padding: 2.5rem; border-radius: 0.75rem; width: 100%; max-width: 400px; border: 1px solid #334155; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
    .login-logo { font-size: 3rem; text-align: center; margin-bottom: 1rem; }
    .login-titulo { text-align: center; font-size: 1.75rem; margin: 0 0 0.5rem 0; }
    .login-sub { text-align: center; color: #94a3b8; margin: 0 0 2rem 0; font-size: 0.9rem; }
    .tab-row { display: flex; gap: 1rem; margin-bottom: 1.5rem; border-bottom: 1px solid #334155; padding-bottom: 0.5rem; }
    .tab-btn { background: transparent; border: none; color: #94a3b8; font-size: 1rem; cursor: pointer; padding: 0.5rem 0; }
    .tab-btn.activo { color: #3b82f6; border-bottom: 2px solid #3b82f6; font-weight: bold; }
    .input-field { width: 100%; padding: 0.75rem; background: #0f172a; border: 1px solid #334155; border-radius: 0.375rem; color: white; margin-bottom: 1rem; box-sizing: border-box; }
    .input-wrap { position: relative; }
    .eye-btn { position: absolute; right: 0.75rem; top: 0.75rem; background: transparent; border: none; cursor: pointer; font-size: 1.2rem; }
    .login-btn { width: 100%; padding: 0.75rem; background: #3b82f6; border: none; border-radius: 0.375rem; color: white; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 0.5rem; }
    .err-box { background: #7f1d1d; border: 1px solid #ef4444; color: #fca5a5; padding: 0.75rem; border-radius: 0.375rem; margin-bottom: 1rem; font-size: 0.9rem; }
    .reglas-pw { font-size: 0.8rem; color: #94a3b8; margin-top: 1rem; line-height: 1.4; }
    .materias-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .materia-card { display: flex; align-items: center; gap: 1rem; padding: 1rem; border-radius: 0.5rem; border: 1px solid #334155; background: #1e293b; color: white; text-align: left; cursor: pointer; width: 100%; box-sizing: border-box; }
    .materia-card.opaca { opacity: 0.6; }
    .materia-icon { width: 40px; height: 40px; border-radius: 0.375rem; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; }
    .materia-nombre { font-weight: 600; flex-grow: 1; }
    .materia-count { font-size: 0.8rem; color: #94a3b8; }
    .sin-clases-banner { background: #7f1d1d; border: 1px solid #ef4444; border-radius: 0.5rem; padding: 2rem; text-align: center; margin-bottom: 2rem; }
    .sin-clases-icon { font-size: 3rem; margin-bottom: 0.5rem; }
    .sin-clases-texto { font-weight: bold; font-size: 1.5rem; color: #fca5a5; }
    .sin-clases-razon { margin-top: 0.5rem; color: #e2e8f0; }
    .fecha-bar { display: flex; justify-content: center; margin-bottom: 2rem; }
    .fecha-picker { display: flex; align-items: center; gap: 0.75rem; background: #1e293b; padding: 0.5rem 1rem; border-radius: 0.5rem; border: 1px solid #334155; }
    .fecha-picker .val { font-weight: bold; }
    .fecha-picker .sep { color: #475569; }
    .cal-nav-btn { background: #334155; border: none; color: white; width: 28px; height: 28px; border-radius: 0.25rem; cursor: pointer; font-size: 1rem; display: inline-flex; align-items: center; justify-content: center; }
    .seccion-titulo { font-size: 1.25rem; font-weight: bold; margin-bottom: 1rem; color: #94a3b8; border-left: 4px solid #3b82f6; padding-left: 0.5rem; }
    .cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; background: #1e293b; padding: 1rem; border-radius: 0.5rem; border: 1px solid #334155; }
    .cal-mes { font-size: 1.25rem; font-weight: bold; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0.5rem; background: #1e293b; padding: 1rem; border-radius: 0.5rem; border: 1px solid #334155; }
    .cal-header-dia { text-align: center; font-weight: bold; color: #64748b; padding: 0.5rem 0; font-size: 0.9rem; }
    .cal-dia { background: #1e293b; border: 1px solid #334155; min-height: 80px; padding: 0.5rem; border-radius: 0.25rem; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; position: relative; }
    .cal-dia.hoy { border-color: #3b82f6; box-shadow: 0 0 0 2px #3b82f6; }
    .cal-dia-num { font-weight: bold; font-size: 1.1rem; }
    .cal-dia-label { font-size: 0.7rem; font-weight: bold; text-transform: uppercase; margin-top: 0.25rem; }
    .cal-dia-punto { color: #4ade80; font-size: 0.8rem; align-self: center; }
    .cal-dia-marcadores { display: flex; gap: 2px; margin-top: 0.5rem; width: 100%; overflow-x: auto; }
    .cal-marca-btn { font-size: 0.6rem; padding: 2px 4px; background: #475569; border: none; color: white; border-radius: 2px; cursor: pointer; text-transform: uppercase; }
    .cal-marca-btn.activo { background: #3b82f6; font-weight: bold; }
    .cal-leyenda { display: flex; gap: 1.5rem; margin: 1rem 0 2rem 0; font-size: 0.9rem; background: #1e293b; padding: 0.75rem; border-radius: 0.5rem; border: 1px solid #334155; }
    .cal-ley-item { display: flex; align-items: center; gap: 0.5rem; }
    .cal-ley-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
    .tabla-wrap { width: 100%; overflow-x: auto; background: #1e293b; border-radius: 0.5rem; border: 1px solid #334155; margin-bottom: 2rem; }
    .tabla { width: 100%; border-collapse: collapse; text-align: left; }
    .tabla th, .tabla td { padding: 1rem; border-bottom: 1px solid #334155; }
    .tabla th { background: #0f172a; color: #94a3b8; font-size: 0.9rem; text-transform: uppercase; }
    .select-rol { background: #0f172a; color: white; border: 1px solid #334155; padding: 0.25rem 0.5rem; border-radius: 0.25rem; }
    .input-dias { width: 50px; background: #0f172a; color: white; border: 1px solid #334155; padding: 0.25rem; border-radius: 0.25rem; text-align: center; }
    .penalizar-wrap { display: flex; align-items: center; gap: 0.5rem; }
    .action-btn { background: #475569; border: none; color: white; padding: 0.25rem 0.75rem; border-radius: 0.25rem; cursor: pointer; font-size: 0.85rem; }
    .action-btn.peligroso { background: #ef4444; }
    .estado-activo { color: #10b981; font-weight: bold; }
    .estado-penalizado { color: #f87171; font-size: 0.85rem; }
    .roles-info { background: #1e293b; border: 1px solid #334155; padding: 1.5rem; border-radius: 0.5rem; color: #94a3b8; line-height: 1.6; }
    .back-btn { background: #334155; border: none; color: white; padding: 0.5rem 1rem; border-radius: 0.375rem; cursor: pointer; margin-bottom: 1.5rem; }
    .materia-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem; }
    .materia-header h2 { margin: 0; font-size: 1.75rem; }
    .fecha-key { font-size: 0.9rem; color: #94a3b8; margin-top: 0.25rem; }
    .subir-box { background: #1e293b; border: 1px solid #334155; padding: 1.5rem; border-radius: 0.5rem; margin-bottom: 2rem; }
    .tipo-btns { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .tipo-btn { background: transparent; border: 1px solid #475569; color: #94a3b8; padding: 0.375rem 0.75rem; border-radius: 0.25rem; cursor: pointer; font-size: 0.85rem; text-transform: capitalize; }
    .textarea-apunte { width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 0.375rem; color: white; padding: 0.75rem; box-sizing: border-box; font-family: inherit; font-size: 1rem; margin-bottom: 1rem; resize: vertical; }
    .subir-btn { color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 0.375rem; font-weight: bold; cursor: pointer; font-size: 1rem; }
    .apunte-card { background: #1e293b; border: 1px solid #334155; border-radius: 0.5rem; padding: 1.25rem; margin-bottom: 1rem; }
    .apunte-meta { display: flex; align-items: center; gap: 0.75rem; font-size: 0.85rem; color: #94a3b8; margin-bottom: 0.75rem; }
    .tipo-badge { padding: 0.125rem 0.5rem; border-radius: 0.25rem; font-weight: bold; text-transform: uppercase; font-size: 0.75rem; }
    .apunte-autor { flex-grow: 1; }
    .del-btn { background: transparent; border: none; color: #64748b; cursor: pointer; font-size: 1.1rem; }
    .del-btn:hover { color: #ef4444; }
    .apunte-texto { font-size: 1.05rem; line-height: 1.5; white-space: pre-wrap; }
    .sin-apuntes { text-align: center; color: #64748b; padding: 2rem; }
  </style>
</head>
<body>
  
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>

  <script>
    // ─── DATOS INICIALES ───────────────────────────────────────────────────────────
    const MATERIAS = [
      { id: "mat_apl",   nombre: "Matemática Aplicada",   icon: "∑",  color: "#3b82f6" },
      { id: "ing",       nombre: "Inglés",                icon: "🗺", color: "#6366f1" },
      { id: "arte",      nombre: "Arte",                  icon: "🎨", color: "#fb7185" },
      { id: "inv_op",    nombre: "Inv. Operativa",        icon: "📊", color: "#10b981" },
      { id: "hardware",  nombre: "Hardware",              icon: "🖥", color: "#f97316" },
      { id: "lit",       nombre: "Literatura",            icon: "✒", color: "#8b5cf6" },
      { id: "sist_dig",  nombre: "Sist. Digitales",       icon: "⚡", color: "#06b6d4" },
      { id: "der_trab",  nombre: "Derecho del Trabajo",   icon: "⚖", color: "#f59e0b" },
      { id: "lab_apl",   nombre: "Lab. Aplicaciones",     icon: "📱", color: "#14b8a6" },
      { id: "filosofia", nombre: "Filosofía",            icon: "🧠", color: "#a78bfa" },
      { id: "lab_prog",  nombre: "Lab. Programación",     icon: "💻", color: "#64748b" },
      { id: "lab_sist",  nombre: "Lab. Sist. Operativos", icon: "🔧", color: "#ec4899" },
      { id: "seg_inf",   nombre: "Seguridad Informática", icon: "🔒", color: "#ef4444" },
    ];

    const HORARIO_SEMANAL = {
      1: ["mat_apl", "hardware", "lab_prog", "lab_apl"],
      2: ["ing", "lit"],
      3: ["arte", "sist_dig", "inv_op", "lab_sist"],
      4: ["inv_op", "hardware", "der_trab"],
      5: ["inv_op", "seg_inf", "filosofia", "lab_sist"],
    };

    const FERIADOS_ARG = [
      "01-01", "03-03", "03-04", "04-02", "05-01", "05-25",
      "06-17", "06-20", "07-09", "08-17", "10-12", "11-20", "12-08", "12-25"
    ];

    const USUARIOS_INICIALES = [
      { id: 1, gmail: "creadort2@gmail.com",    password: "Admin2024",  rol: "creador",     nombre: "Admin",     penalizado: null },
      { id: 2, gmail: "delegadot2@gmail.com",    password: "Delegado1",  rol: "delegado",    nombre: "Delegado",    penalizado: null },
      { id: 3, gmail: "subdelegadot2@gmail.com", password: "Subdeleg1",  rol: "subdelegado", nombre: "Subdelegado", penalizado: null },
      { id: 4, gmail: "alumno1t2@gmail.com",     password: "Alumno01",   rol: "alumno",      nombre: "Alumno 1",    penalizado: null },
    ];

    // ─── UTILIDADES ────────────────────────────────────────────────────────────────
    function diasEnMes(m, y) { return new Date(y, m, 0).getDate(); }
    function pad(n) { return String(n).padStart(2, "0"); }
    function esFeriado(dia, mes) { return FERIADOS_ARG.includes(`${pad(mes)}-${pad(dia)}`); }
    function esFinde(dia, mes, anio) { const d = new Date(anio, mes - 1, dia).getDay(); return d === 0 || d === 6; }
    function diaSemana(dia, mes, anio) { return new Date(anio, mes - 1, dia).getDay(); }
    function esPenalizado(u) { return u && u.penalizado && new Date() < new Date(u.penalizado); }

    function rolColor(rol) {
      return { creador: "#ef4444", delegado: "#f59e0b", subdelegado: "#a78bfa", alumno: "#3b82f6" }[rol] || "#475569";
    }

    function validarPassword(pw) {
      if (pw.length < 6 || pw.length > 12) return "La contraseña debe tener entre 6 y 12 caracteres.";
      if (/[#$%/!@&*()External+=`[\]{}<>?,;:'"\\|^~]/.test(pw)) return "No se permiten caracteres especiales.";
      if (/(.)\1{3,}/.test(pw)) return "No se permiten caracteres repetidos en secuencia.";
      if (/0123|1234|2345|3456|4567|5678|6789|9876|8765|7654|6543|5432|4321|3210/.test(pw)) return "No se permiten números secuenciales.";
      return null;
    }

    function validarGmail(g) {
      if (!g.includes("@")) {
        return "Formato de correo electrónico inválido.";
      }

      const nombreUsuario = g.split("@")[0];

      if (!nombreUsuario.toLowerCase().includes("t2")) {
        return "Antes de la @ debe contener 't2'.";
      }

      return null;
    }

    // ─── APP PRINCIPAL ─────────────────────────────────────────────────────────────
    function App() {
      const { useState, useEffect } = React;

      const [usuarios, setUsuarios] = useState(() => {
        try { return JSON.parse(localStorage.getItem("usuarios_6to2da_v2")) || USUARIOS_INICIALES; }
        catch { return USUARIOS_INICIALES; }
      });
      const [apuntes, setApuntes] = useState(() => {
        try { return JSON.parse(localStorage.getItem("apuntes_6to2da_v2")) || {}; }
        catch { return {}; }
      });
      const [diasEspeciales, setDiasEspeciales] = useState(() => {
        try { return JSON.parse(localStorage.getItem("dias_especiales_6to2da_v2")) || {}; }
        catch { return {}; }
      });

      const [sesion, setSesion] = useState(null);
      const [vista, setVista] = useState("login");
      const [materiaActiva, setMateriaActiva] = useState(null);
      const [anio] = useState(new Date().getFullYear());
      const [mesActivo, setMesActivo] = useState(new Date().getMonth() + 1);
      const [diaActivo, setDiaActivo] = useState(new Date().getDate());
      const [notif, setNotif] = useState(null);

      useEffect(() => { localStorage.setItem("usuarios_6to2da_v2", JSON.stringify(usuarios)); }, [usuarios]);
      useEffect(() => { localStorage.setItem("apuntes_6to2da_v2", JSON.stringify(apuntes)); }, [apuntes]);
      useEffect(() => { localStorage.setItem("dias_especiales_6to2da_v2", JSON.stringify(diasEspeciales)); }, [diasEspeciales]);

      function cambiarMesSeguro(nuevoMes) {
        setMesActivo(nuevoMes);
        const maxDiasEnNuevoMes = diasEnMes(nuevoMes, anio);
        if (diaActivo > maxDiasEnNuevoMes) setDiaActivo(maxDiasEnNuevoMes);
      }

      function showNotif(msg, tipo = "info") {
        setNotif({ msg, tipo });
      }

      useEffect(() => {
        if (!notif) return;
        const timer = setTimeout(() => setNotif(null), 3500);
        return () => clearTimeout(timer);
      }, [notif]);

      const keyFecha = `${anio}-${pad(mesActivo)}-${pad(diaActivo)}`;
      const diaDeHoy = diaSemana(diaActivo, mesActivo, anio);
      const materiasHoy = HORARIO_SEMANAL[diaDeHoy] || [];
      const esFeradoHoy = esFeriado(diaActivo, mesActivo);
      const esDiaEspecial = diasEspeciales[keyFecha];
      const sinClases = esFeradoHoy || ["feriado", "paro", "sin_profe"].includes(esDiaEspecial) || esFinde(diaActivo, mesActivo, anio);

      if (vista === "login") {
        return React.createElement(LoginScreen, { usuarios, setUsuarios, setSesion, setVista, showNotif, notif });
      }

      return React.createElement("div", null,
        notif && React.createElement("div", { className: `notif ${notif.tipo}` }, notif.msg),

        React.createElement("header", { className: "header" },
          React.createElement("div", { className: "header-left" },
            React.createElement("span", { className: "header-logo" }, "📚"),
            React.createElement("div", null,
              React.createElement("div", { className: "header-titulo" }, "Apuntes 6to 2da"),
              React.createElement("div", { className: "header-sub" }, "Sistema de apuntes escolares")
            )
          ),
          React.createElement("nav", { className: "nav" },
            React.createElement("button", { className: `nav-btn ${vista === "menu" ? "activo" : ""}`, onClick: () => setVista("menu") }, "Menú"),
            React.createElement("button", { className: `nav-btn ${vista === "calendario" ? "activo" : ""}`, onClick: () => setVista("calendario") }, "Calendario"),
            ["creador", "delegado", "subdelegado"].includes(sesion?.rol) &&
              React.createElement("button", { className: `nav-btn ${vista === "admin" ? "activo" : ""}`, onClick: () => setVista("admin") }, "Panel"),
            React.createElement("div", { className: "user-chip" },
              React.createElement("span", { className: "rol-badge", style: { background: rolColor(sesion?.rol) } }, sesion?.rol),
              React.createElement("span", { style: { fontSize: 12, color: "#94a3b8" } }, sesion?.nombre),
              React.createElement("button", { className: "logout-btn", onClick: () => { setSesion(null); setVista("login"); } }, "↩")
            )
          )
        ),

        vista === "menu" && React.createElement("main", { className: "main" },
          React.createElement("div", { className: "fecha-bar" },
            React.createElement(FechaPicker, { diaActivo, mesActivo, anio, setDia: setDiaActivo, setMes: cambiarMesSeguro })
          ),
          sinClases
            ? React.createElement("div", { className: "sin-clases-banner" },
                React.createElement("div", { className: "sin-clases-icon" }, "🚫"),
                React.createElement("div", { className: "sin-clases-texto" }, "NO HAY CLASES"),
                React.createElement("div", { className: "sin-clases-razon" },
                  esFinde(diaActivo, mesActivo, anio) ? "Fin de semana" :
                  esFeradoHoy ? "Feriado nacional" :
                  esDiaEspecial === "paro" ? "Paro docente" :
                  esDiaEspecial === "sin_profe" ? "Docente ausente" : "Día especial"
                )
              )
            : React.createElement("div", null,
                React.createElement("div", { className: "seccion-titulo" }, "Materias de hoy"),
                React.createElement("div", { className: "materias-grid" },
                  materiasHoy.length === 0
                    ? React.createElement("div", { style: { color: "#64748b", gridColumn: "1/-1", textAlign: "center", padding: 32 } }, "Sin materias programadas.")
                    : materiasHoy.map(mid => {
                        const mat = MATERIAS.find(m => m.id === mid);
                        const cnt = (apuntes[keyFecha]?.[mid] || []).length;
                        return React.createElement("button", {
                          key: mid,
                          className: "materia-card",
                          style: { borderColor: mat.color + "44", background: mat.color + "11" },
                          onClick: () => { setMateriaActiva(mid); setVista("materia"); }
                        },
                          React.createElement("div", { className: "materia-icon", style: { background: mat.color } }, mat.icon),
                          React.createElement("div", { className: "materia-nombre" }, mat.nombre),
                          React.createElement("div", { className: "materia-count" }, `${cnt} apunte${cnt !== 1 ? "s" : ""}`)
                        );
                      })
                ),
                React.createElement("div", { className: "seccion-titulo" }, "Todas las materias"),
                React.createElement("div", { className: "materias-grid" },
                  MATERIAS.filter(m => !materiasHoy.includes(m.id)).map(mat => {
                    const cnt = (apuntes[keyFecha]?.[mat.id] || []).length;
                    return React.createElement("button", {
                      key: mat.id,
                      className: "materia-card opaca",
                      onClick: () => { setMateriaActiva(mat.id); setVista("materia"); }
                    },
                      React.createElement("div", { className: "materia-icon", style: { background: mat.color } }, mat.icon),
                      React.createElement("div", { className: "materia-nombre" }, mat.nombre),
                      React.createElement("div", { className: "materia-count" }, `${cnt} apunte${cnt !== 1 ? "s" : ""}`)
                    );
                  })
                )
              )
        ),

        vista === "materia" && materiaActiva &&
          React.createElement(MateriaView, {
            mat: MATERIAS.find(m => m.id === materiaActiva),
            keyFecha, apuntes, setApuntes, sesion, showNotif,
            volver: () => setVista("menu"),
            diasEspeciales, anio, mesActivo, diaActivo
          }),

        vista === "calendario" &&
          React.createElement(CalendarioView, {
            anio, mesActivo, setMesActivo: cambiarMesSeguro, diaActivo, setDiaActivo,
            diasEspeciales, setDiasEspeciales, sesion, apuntes,
            setVista, setMateriaActiva, showNotif
          }),

        vista === "admin" &&
          React.createElement(AdminView, { sesion, usuarios, setUsuarios, showNotif })
      );
    }

    // ─── LOGIN SCREEN ──────────────────────────────────────────────────────────────
    function LoginScreen({ usuarios, setUsuarios, setSesion, setVista, showNotif, notif }) {
      const { useState } = React;
      const [gmail, setGmail] = useState("");
      const [pw, setPw] = useState("");
      const [err, setErr] = useState("");
      const [modo, setModo] = useState("login");
      const [nombre, setNombre] = useState("");
      const [showPw, setShowPw] = useState(false);

      function handleLogin() {
        setErr("");
        const cleanGmail = gmail.trim().toLowerCase();
        const ge = validarGmail(cleanGmail); if (ge) { setErr(ge); return; }
        const u = usuarios.find(u => u.gmail.toLowerCase() === cleanGmail && u.password === pw);
        if (!u) { setErr("Gmail o contraseña incorrectos."); return; }
        setSesion(u); setVista("menu");
        showNotif(`Bienvenido/a, ${u.nombre}!`, "ok");
      }

      function handleRegistro() {
        setErr("");
        const cleanGmail = gmail.trim().toLowerCase();
        const ge = validarGmail(cleanGmail); if (ge) { setErr(ge); return; }
        if (!nombre.trim()) { setErr("Ingresá tu nombre."); return; }
        const pe = validarPassword(pw); if (pe) { setErr(pe); return; }
        if (usuarios.find(u => u.gmail.toLowerCase() === cleanGmail)) { setErr("Ese Gmail ya está registrado."); return; }
        setUsuarios(prev => [...prev, { id: Date.now(), gmail: cleanGmail, password: pw, rol: "alumno", nombre: nombre.trim(), penalizado: null }]);
        showNotif("Cuenta creada. Un creador asignará tu rol.", "ok");
        setModo("login");
      }

      return React.createElement("div", { className: "login-bg" },
        notif && React.createElement("div", { className: `notif ${notif.tipo}` }, notif.msg),
        React.createElement("div", { className: "login-card" },
          React.createElement("div", { className: "login-logo" }, "📚"),
          React.createElement("h1", { className: "login-titulo" }, "Apuntes 6to 2da"),
          React.createElement("p", { className: "login-sub" }, "Sistema de apuntes del aula"),

          React.createElement("div", { className: "tab-row" },
            React.createElement("button", { className: `tab-btn ${modo === "login" ? "activo" : ""}`, onClick: () => setModo("login") }, "Iniciar sesión"),
            React.createElement("button", { className: `tab-btn ${modo === "registro" ? "activo" : ""}`, onClick: () => setModo("registro") }, "Registrarse")
          ),

          modo === "registro" && React.createElement("input", { className: "input-field", placeholder: "Nombre completo", value: nombre, onChange: e => setNombre(e.target.value) }),
          React.createElement("input", { className: "input-field", placeholder: "tunombret2@gmail.com", type: "email", value: gmail, onChange: e => setGmail(e.target.value) }),
          React.createElement("div", { className: "input-wrap" },
            React.createElement("input", {
              className: "input-field", placeholder: "Contraseña (6-12 caracteres)",
              type: showPw ? "text" : "password", value: pw, onChange: e => setPw(e.target.value),
              onKeyDown: e => e.key === "Enter" && (modo === "login" ? handleLogin() : handleRegistro())
            }),
            React.createElement("button", { className: "eye-btn", onClick: () => setShowPw(v => !v) }, showPw ? "🙈" : "👁")
          ),

          err && React.createElement("div", { className: "err-box" }, err),
          React.createElement("button", { className: "login-btn", onClick: modo === "login" ? handleLogin : handleRegistro },
            modo === "login" ? "Entrar" : "Crear cuenta"
          )
        )
      );
    }

    // ─── MATERIA VIEW ──────────────────────────────────────────────────────────────
    function MateriaView({ mat, keyFecha, apuntes, setApuntes, sesion, showNotif, volver, diasEspeciales, anio, mesActivo, diaActivo }) {
      const { useState } = React;
      const [texto, setTexto] = useState("");
      const [tipo, setTipo] = useState("apunte");
      const [archivo, setArchivo] = useState(null);
      const lista = apuntes[keyFecha]?.[mat.id] || [];
      const penalizado = esPenalizado(sesion);
      const esDiaNoClase = esFeriado(diaActivo, mesActivo) || diasEspeciales[keyFecha] || esFinde(diaActivo, mesActivo, anio);

      function subir() {
        if (penalizado) { showNotif("Estás penalizado/a.", "error"); return; }
        if (!texto.trim()) { showNotif("Escribí algo antes de subir.", "error"); return; }
        const nuevo = { id: Date.now(), texto: texto.trim(), tipo, archivo, autor: sesion.nombre, fecha: new Date().toLocaleString("es-AR") };
        setApuntes(prev => ({ ...prev, [keyFecha]: { ...(prev[keyFecha] || {}), [mat.id]: [...(prev[keyFecha]?.[mat.id] || []), nuevo] } }));
        setTexto("");
        showNotif("¡Apunte subido!", "ok");
      }

      function eliminar(id) {
        setApuntes(prev => ({ ...prev, [keyFecha]: { ...(prev[keyFecha] || {}), [mat.id]: (prev[keyFecha]?.[mat.id] || []).filter(a => a.id !== id) } }));
        showNotif("Apunte eliminado.", "ok");
      }

      return React.createElement("main", { className: "main" },
        React.createElement("button", { className: "back-btn", onClick: volver }, "← Volver"),
        React.createElement("div", { className: "materia-header" },
          React.createElement("div", { className: "materia-icon", style: { background: mat.color, width: 48, height: 48, fontSize: 24 } }, mat.icon),
          React.createElement("div", null,
            React.createElement("h2", null, mat.nombre),
            React.createElement("div", { className: "fecha-key" }, keyFecha)
          )
        ),

        esDiaNoClase && React.createElement("div", { className: "sin-clases-banner", style: { padding: "12px 24px", marginBottom: 24 } },
          React.createElement("div", { style: { color: "#fca5a5", fontWeight: 700, fontSize: 18 } }, "🚫 NO HAY CLASES este día")
        ),

        !penalizado
          ? React.createElement("div", { className: "subir-box" },
              React.createElement("div", { className: "tipo-btns" },
                ["apunte", "tarea", "lo que hizo el profe", "otro"].map(t =>
                  React.createElement("button", {
                    key: t, className: "tipo-btn",
                    style: { background: tipo === t ? mat.color + "33" : "transparent", borderColor: tipo === t ? mat.color : "#334155", color: tipo === t ? mat.color : "#94a3b8" },
                    onClick: () => setTipo(t)
                  }, t)
                )
              ),
              React.createElement("textarea", { className: "textarea-apunte", rows: 4, placeholder: `Escribí el ${tipo} del día...`, value: texto, onChange: e => setTexto(e.target.value) }),
              React.createElement("input", {
                type: "file",
                className: "input-field",
                onChange: e => {
                  const f = e.target.files[0];
                  if (!f) return;
                  const r = new FileReader();
                  r.onload = () => setArchivo({nombre:f.name,tipo:f.type,data:r.result});
                  r.readAsDataURL(f);
                }
              }),
              React.createElement("button", { className: "subir-btn", style: { background: mat.color }, onClick: subir }, `Subir ${tipo}`)
            )
          : React.createElement("div", { className: "err-box" }, "Estás penalizado/a."),

        React.createElement("div", { className: "seccion-titulo" }, "Apuntes del día"),
        lista.length === 0
          ? React.createElement("div", { className: "sin-apuntes" }, "Nadie subió nada aún.")
          : lista.map(a =>
              React.createElement("div", { key: a.id, className: "apunte-card" },
                React.createElement("div", { className: "apunte-meta" },
                  React.createElement("span", { className: "tipo-badge", style: { background: mat.color + "33", color: mat.color } }, a.tipo),
                  React.createElement("span", { className: "apunte-autor" }, `${a.autor} · ${a.fecha}`),
                  ["subdelegado", "delegado", "creador"].includes(sesion.rol) &&
                    React.createElement("button", { className: "del-btn", onClick: () => eliminar(a.id) }, "🗑")
                ),
                React.createElement("div", { className: "apunte-texto" }, a.texto),
                a.archivo && a.archivo.tipo && a.archivo.tipo.startsWith("image/") &&
                  React.createElement("img", {src:a.archivo.data, style:{maxWidth:"100%",marginTop:"10px",borderRadius:"8px"}}),
                a.archivo &&
                  React.createElement("div", {style:{marginTop:"10px"}},
                    React.createElement("a", {href:a.archivo.data, download:a.archivo.nombre, style:{color:"#60a5fa"}}, "📎 " + a.archivo.nombre)
                  )
              )
            )
      );
    }

    // ─── CALENDARIO VIEW ───────────────────────────────────────────────────────────
    function CalendarioView({ anio, mesActivo, setMesActivo, diaActivo, setDiaActivo, diasEspeciales, setDiasEspeciales, sesion, apuntes, setVista, setMateriaActiva, showNotif }) {
      const dias = diasEnMes(mesActivo, anio);
      const primerDia = new Date(anio, mesActivo - 1, 1).getDay();
      const meses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
      const puedeMarca = sesion.rol === "creador" || sesion.rol === "delegado";

      function marcarDia(dia, tipo) {
        const k = `${anio}-${pad(mesActivo)}-${pad(dia)}`;
        setDiasEspeciales(prev => {
          if (prev[k] === tipo) { const n = { ...prev }; delete n[k]; return n; }
          return { ...prev, [k]: tipo };
        });
        showNotif("Día actualizado", "ok");
      }

      return React.createElement("main", { className: "main" },
        React.createElement("div", { className: "cal-nav" },
          React.createElement("button", { className: "cal-nav-btn", onClick: () => setMesActivo(mesActivo === 1 ? 12 : mesActivo - 1) }, "‹"),
          React.createElement("span", { className: "cal-mes" }, `${meses[mesActivo - 1]} ${anio}`),
          React.createElement("button", { className: "cal-nav-btn", onClick: () => setMesActivo(mesActivo === 12 ? 1 : mesActivo + 1) }, "›")
        ),

        React.createElement("div", { className: "cal-grid" },
          ["Dom", "Lun", "Mar", "Mié", "Jue", "Vie", "Sáb"].map(d => React.createElement("div", { key: d, className: "cal-header-dia" }, d)),
          Array.from({ length: primerDia }).map((_, i) => React.createElement("div", { key: `e${i}` })),
          Array.from({ length: dias }).map((_, i) => {
            const dia = i + 1;
            const k = `${anio}-${pad(mesActivo)}-${pad(dia)}`;
            const especial = diasEspeciales[k];
            const feriado = esFeriado(dia, mesActivo);
            const tieneApuntes = Object.values(apuntes[k] || {}).some(a => a.length > 0);
            return React.createElement("div", { key: dia, className: "cal-dia", onClick: () => setDiaActivo(dia) },
              React.createElement("div", { className: "cal-dia-num" }, dia),
              (feriado || especial === "feriado") && React.createElement("div", { className: "cal-dia-label" }, "Feriado"),
              especial === "paro" && React.createElement("div", { className: "cal-dia-label" }, "Paro"),
              especial === "sin_profe" && React.createElement("div", { className: "cal-dia-label" }, "Sin profe"),
              tieneApuntes && React.createElement("div", { className: "cal-dia-punto" }, "●"),
              puedeMarca && !feriado && React.createElement("div", { className: "cal-dia-marcadores" },
                ["paro", "sin_profe", "feriado"].map(t =>
                  React.createElement("button", { key: t, className: "cal-marca-btn", onClick: e => { e.stopPropagation(); marcarDia(dia, t); } }, t)
                )
              )
            );
          })
        )
      );
    }

    // ─── ADMIN VIEW ────────────────────────────────────────────────────────────────
    function AdminView({ sesion, usuarios, setUsuarios, showNotif }) {
      const [penDiasMap, setPenDiasMap] = useState({});
      const roles = ["alumno", "subdelegado", "delegado", "creador"];

      function cambiarRol(uid, nuevoRol) {
        setUsuarios(prev => prev.map(u => u.id === uid ? { ...u, rol: nuevoRol } : u));
        showNotif("Rol actualizado.", "ok");
      }

      function penalizarUsuario(uid) {
        const dias = penDiasMap[uid] || 1;
        const hasta = new Date();
        hasta.setDate(hasta.getDate() + dias);
        setUsuarios(prev => prev.map(u => u.id === uid ? { ...u, penalizado: hasta.toISOString() } : u));
        showNotif("Usuario penalizado.", "ok");
      }

      return React.createElement("main", { className: "main" },
        React.createElement("h2", null, "Panel de gestión"),
        React.createElement("div", { className: "tabla-wrap" },
          React.createElement("table", { className: "tabla" },
            React.createElement("thead", null,
              React.createElement("tr", null, ["Nombre", "Gmail", "Rol", "Estado", "Acciones"].map(h => React.createElement("th", { key: h }, h)))
            ),
            React.createElement("tbody", null,
              usuarios.map(u => React.createElement("tr", { key: u.id },
                React.createElement("td", null, u.nombre),
                React.createElement("td", null, u.gmail),
                React.createElement("td", null, 
                  sesion.rol === "creador" && u.id !== sesion.id
                    ? React.createElement("select", { className: "select-rol", value: u.rol, onChange: e => cambiarRol(u.id, e.target.value) },
                        roles.map(r => React.createElement("option", { key: r, value: r }, r))
                      )
                    : React.createElement("span", null, u.rol)
                ),
                React.createElement("td", null, esPenalizado(u) ? "Penalizado" : "Activo"),
                React.createElement("td", null,
                  u.id !== sesion.id && React.createElement("button", { className: "action-btn peligroso", onClick: () => penalizarUsuario(u.id) }, "Penalizar")
                )
              ))
            )
          )
        )
      );
    }

    // ─── FECHA PICKER ──────────────────────────────────────────────────────────────
    function FechaPicker({ diaActivo, mesActivo, anio, setDia, setMes }) {
      const meses = ["Ene", "Feb", "Mar", "Abr", "May", "Jun", "Jul", "Ago", "Sep", "Oct", "Nov", "Dic"];
      const dias = diasEnMes(mesActivo, anio);
      return React.createElement("div", { className: "fecha-picker" },
        React.createElement("button", { className: "cal-nav-btn", onClick: () => setMes(mesActivo === 1 ? 12 : mesActivo - 1) }, "‹"),
        React.createElement("span", { className: "val" }, `${meses[mesActivo - 1]} ${anio}`),
        React.createElement("button", { className: "cal-nav-btn", onClick: () => setMes(mesActivo === 12 ? 1 : mesActivo + 1) }, "›"),
        React.createElement("span", { className: "sep" }, "|"),
        React.createElement("button", { className: "cal-nav-btn", onClick: () => setDia(diaActivo === 1 ? dias : diaActivo - 1) }, "‹"),
        React.createElement("span", { className: "val" }, diaActivo),
        React.createElement("button", { className: "cal-nav-btn", onClick: () => setDia(diaActivo === dias ? 1 : diaActivo + 1) }, "›")
      );
    }

    // ─── MONTAR APP ────────────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
  </script>
</body>
</html>
